document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n:root{\n  --color-bg:#0a0a0f;\n  --color-surface:#111118;\n  --color-surface-2:#16161e;\n  --color-surface-3:#1c1c26;\n  --color-text:#e8e8f0;\n  --color-text-muted:#7a7a8c;\n  --color-text-dim:#52525e;\n  --color-primary:#00d4d8;\n  --color-primary-2:#7df9ff;\n  --color-primary-glow:rgba(0,212,216,0.15);\n  --color-accent-gold:#ffd700;\n  --color-border:rgba(255,255,255,0.07);\n  --color-border-2:rgba(255,255,255,0.12);\n\n  --font-display:'Space Grotesk', 'Clash Display', ui-sans-serif, system-ui, sans-serif;\n  --font-body:'DM Sans', 'Satoshi', ui-sans-serif, system-ui, sans-serif;\n  --font-mono:'JetBrains Mono', ui-monospace, monospace;\n\n  --radius-sm:8px;\n  --radius:14px;\n  --radius-lg:22px;\n  --maxw:1240px;\n}\n\n*{box-sizing:border-box;margin:0;padding:0;}\nhtml{scroll-behavior:smooth;}\nhtml,body{background:var(--color-bg);color:var(--color-text);}\nbody{\n  font-family:var(--font-body);\n  font-weight:400;\n  line-height:1.5;\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\nimg{max-width:100%;display:block;}\na{color:inherit;text-decoration:none;}\nbutton{font:inherit;color:inherit;background:none;border:0;cursor:pointer;}\n::selection{background:var(--color-primary);color:#001214;}\n\nh1,h2,h3,h4{font-family:var(--font-display);font-weight:500;letter-spacing:-0.02em;line-height:1.05;}\n.eyebrow{\n  font-family:var(--font-mono);\n  font-size:12px;\n  letter-spacing:0.18em;\n  text-transform:uppercase;\n  color:var(--color-primary);\n  display:inline-flex;align-items:center;gap:10px;\n}\n.eyebrow::before{content:\"\";width:24px;height:1px;background:var(--color-primary);display:inline-block;}\n\n/* Icons */\n.ic{width:1em;height:1em;display:inline-block;vertical-align:-0.15em;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}\n.ic-fill{fill:currentColor;stroke:none;}\n\n.container{max-width:var(--maxw);margin:0 auto;padding:0 32px;}\n\n/* ============================================================\n   NAVBAR\n   ============================================================ */\n.nav{\n  position:fixed;top:0;left:0;right:0;z-index:50;\n  padding:18px 0;\n  transition:background .3s ease, backdrop-filter .3s ease, border-color .3s ease, padding .3s ease;\n  border-bottom:1px solid transparent;\n}\n.nav.scrolled{\n  background:rgba(10,10,15,0.72);\n  backdrop-filter:saturate(140%) blur(14px);\n  -webkit-backdrop-filter:saturate(140%) blur(14px);\n  border-bottom:1px solid var(--color-border);\n  padding:12px 0;\n}\n.nav-inner{display:flex;align-items:center;justify-content:space-between;}\n.logo{display:flex;align-items:center;gap:12px;font-family:var(--font-display);font-weight:600;font-size:18px;}\n.logo-mark{\n  width:36px;height:36px;border-radius:10px;\n  background:linear-gradient(135deg, rgba(0,212,216,0.16), rgba(0,212,216,0.02));\n  border:1px solid rgba(0,212,216,0.35);\n  display:grid;place-items:center;\n  box-shadow:0 0 0 1px rgba(0,212,216,0.05) inset, 0 8px 24px -10px rgba(0,212,216,0.4);\n}\n.logo-mark svg{width:18px;height:18px;}\n.nav-links{display:flex;gap:32px;align-items:center;}\n.nav-links a{font-size:14px;color:var(--color-text-muted);transition:color .2s;display:inline-flex;align-items:center;gap:6px;}\n.nav-links a:hover{color:var(--color-text);}\n.nav-links a .ic{width:14px;height:14px;opacity:.7;}\n.nav-cta{\n  font-size:13px;font-weight:500;\n  padding:10px 18px;border-radius:99px;\n  border:1px solid var(--color-border-2);\n  display:inline-flex;align-items:center;gap:8px;\n  transition:border-color .2s, background .2s, color .2s;\n}\n.nav-cta:hover{border-color:var(--color-primary);color:var(--color-primary);}\n.nav-cta svg{width:14px;height:14px;}\n.nav-burger{display:none;}\n\n/* ============================================================\n   HERO\n   ============================================================ */\n.hero{\n  position:relative;\n  min-height:100vh;\n  padding:120px 0 80px;\n  overflow:hidden;\n  isolation:isolate;\n}\n#hero-canvas{\n  position:absolute;inset:0;z-index:-1;\n  width:100%;height:100%;\n}\n.hero::before{\n  content:\"\";position:absolute;inset:0;z-index:-1;\n  background:\n    radial-gradient(800px 600px at 78% 35%, rgba(0,212,216,0.10), transparent 60%),\n    radial-gradient(900px 700px at 10% 90%, rgba(0,212,216,0.06), transparent 60%);\n  pointer-events:none;\n}\n.hero::after{\n  content:\"\";position:absolute;inset:0;z-index:-1;pointer-events:none;\n  background:linear-gradient(180deg, transparent 0%, transparent 60%, var(--color-bg) 100%);\n}\n.hero-grid{\n  display:grid;grid-template-columns:1.35fr 1fr;gap:64px;align-items:center;\n}\n.hero .available{\n  display:inline-flex;align-items:center;gap:10px;\n  padding:7px 14px;border-radius:99px;\n  border:1px solid var(--color-border-2);\n  background:rgba(255,255,255,0.02);\n  font-size:12px;color:var(--color-text-muted);\n  margin-bottom:28px;\n}\n.hero .available .dot{\n  width:7px;height:7px;border-radius:50%;background:var(--color-primary);\n  box-shadow:0 0 0 4px rgba(0,212,216,0.15);\n  animation:pulse 2.4s ease-in-out infinite;\n}\n@keyframes pulse{0%,100%{box-shadow:0 0 0 4px rgba(0,212,216,0.15);}50%{box-shadow:0 0 0 8px rgba(0,212,216,0.02);}}\n\n.hero h1{\n  font-size:clamp(48px, 7.2vw, 96px);\n  letter-spacing:-0.035em;\n  font-weight:500;\n}\n.hero h1 .grad{\n  background:linear-gradient(120deg, #e8e8f0 0%, #e8e8f0 40%, var(--color-primary) 70%, var(--color-primary-2) 100%);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n}\n.typed-row{\n  margin-top:22px;display:flex;align-items:center;gap:12px;\n  font-family:var(--font-mono);font-size:14px;color:var(--color-text-muted);\n  height:22px;\n}\n.typed-row .chev{color:var(--color-primary);}\n#typed{color:var(--color-text);}\n.typed-cursor{color:var(--color-primary);}\n.hero-tag{\n  margin-top:28px;\n  font-size:clamp(17px, 1.4vw, 19px);\n  color:var(--color-text-muted);\n  max-width:560px;\n}\n.hero-tag b{color:var(--color-text);font-weight:500;}\n.hero-cta{display:flex;gap:14px;margin-top:38px;flex-wrap:wrap;}\n.btn{\n  display:inline-flex;align-items:center;gap:10px;\n  padding:14px 22px;border-radius:99px;\n  font-size:14px;font-weight:500;letter-spacing:0.01em;\n  transition:transform .2s ease, box-shadow .25s ease, background .2s ease, color .2s ease, border-color .2s ease;\n  border:1px solid transparent;\n}\n.btn svg{width:15px;height:15px;}\n.btn-primary{\n  background:var(--color-primary);color:#00171a;\n  box-shadow:0 10px 30px -10px rgba(0,212,216,0.5), inset 0 0 0 1px rgba(255,255,255,0.15);\n}\n.btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 40px -10px rgba(0,212,216,0.65);}\n.btn-ghost{\n  border-color:var(--color-border-2);color:var(--color-text);\n  background:rgba(255,255,255,0.02);\n}\n.btn-ghost:hover{border-color:var(--color-primary);color:var(--color-primary);}\n\n.hero-meta{\n  margin-top:48px;display:flex;gap:34px;flex-wrap:wrap;\n  font-family:var(--font-mono);font-size:12px;color:var(--color-text-dim);\n  letter-spacing:0.06em;text-transform:uppercase;\n}\n.hero-meta span b{color:var(--color-text-muted);font-weight:500;}\n\n/* avatar card */\n.avatar-card{\n  position:relative;justify-self:end;align-self:center;\n  width:340px;max-width:100%;\n  padding:22px;border-radius:24px;\n  background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));\n  border:1px solid var(--color-border-2);\n  backdrop-filter:blur(10px);\n  animation:float 7s ease-in-out infinite;\n  box-shadow:0 30px 80px -30px rgba(0,212,216,0.35), 0 0 0 1px rgba(0,212,216,0.15) inset;\n}\n.avatar-card::before{\n  content:\"\";position:absolute;inset:-1px;border-radius:25px;padding:1px;\n  background:linear-gradient(135deg, rgba(0,212,216,0.55), transparent 40%, rgba(0,212,216,0.25));\n  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);\n  -webkit-mask-composite:xor;mask-composite:exclude;\n  pointer-events:none;\n}\n@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}\n.avatar-photo{\n  position:relative;aspect-ratio:1/1;border-radius:18px;overflow:hidden;\n  background:\n    radial-gradient(70% 60% at 50% 35%, rgba(0,212,216,0.35), transparent 60%),\n    linear-gradient(135deg, #1a1a26 0%, #0f0f16 100%);\n  display:grid;place-items:center;\n}\n.avatar-monogram{\n  font-family:var(--font-display);font-weight:500;font-size:96px;letter-spacing:-0.04em;\n  background:linear-gradient(160deg, #e8e8f0, var(--color-primary));\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n}\n.avatar-photo .ring{\n  position:absolute;inset:14px;border-radius:14px;border:1px dashed rgba(0,212,216,0.35);\n  animation:slowspin 24s linear infinite;\n}\n@keyframes slowspin{to{transform:rotate(360deg);}}\n.avatar-info{display:flex;justify-content:space-between;align-items:flex-end;margin-top:20px;}\n.avatar-info .name{font-family:var(--font-display);font-size:18px;font-weight:600;}\n.avatar-info .role{font-size:12px;color:var(--color-text-muted);margin-top:4px;}\n.avatar-info .loc{font-family:var(--font-mono);font-size:11px;color:var(--color-text-dim);letter-spacing:0.08em;text-transform:uppercase;text-align:right;}\n.avatar-info .loc b{display:block;color:var(--color-primary);font-weight:500;margin-top:4px;}\n\n.scroll-hint{\n  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);\n  font-family:var(--font-mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;\n  color:var(--color-text-dim);display:flex;align-items:center;gap:10px;\n}\n.scroll-hint .line{width:1px;height:34px;background:linear-gradient(180deg, var(--color-primary), transparent);animation:slide 2s ease-in-out infinite;}\n@keyframes slide{0%{transform:scaleY(0);transform-origin:top;}50%{transform:scaleY(1);transform-origin:top;}51%{transform-origin:bottom;}100%{transform:scaleY(0);transform-origin:bottom;}}\n\n/* ============================================================\n   SHARED SECTION\n   ============================================================ */\nsection{position:relative;padding:140px 0;}\n.section-head{display:grid;grid-template-columns:auto 1fr;gap:42px;align-items:end;margin-bottom:64px;}\n.section-head h2{font-size:clamp(34px, 4.6vw, 56px);max-width:14ch;}\n.section-head p{color:var(--color-text-muted);max-width:42ch;font-size:16px;}\n.section-num{\n  font-family:var(--font-mono);font-size:12px;color:var(--color-text-dim);\n  letter-spacing:0.16em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px;\n}\n.section-num .ic{width:14px;height:14px;color:var(--color-primary);}\n\n.section-icon{\n  width:64px;height:64px;border-radius:16px;\n  background:linear-gradient(160deg, rgba(0,212,216,0.16), rgba(0,212,216,0.02));\n  border:1px solid rgba(0,212,216,0.28);\n  display:grid;place-items:center;\n  margin-bottom:24px;\n  box-shadow:0 12px 32px -16px rgba(0,212,216,0.45), inset 0 0 0 1px rgba(255,255,255,0.04);\n  position:relative;\n}\n.section-icon::after{\n  content:\"\";position:absolute;inset:6px;border-radius:11px;\n  border:1px dashed rgba(0,212,216,0.22);\n  animation:slowspin 20s linear infinite;\n}\n.section-icon .ic{width:26px;height:26px;color:var(--color-primary);stroke-width:1.6;}\n\n/* ============================================================\n   ABOUT\n   ============================================================ */\n.about-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:80px;align-items:start;}\n.bio p{font-size:18px;line-height:1.65;color:var(--color-text);}\n.bio p + p{margin-top:18px;}\n.bio p .hl{color:var(--color-primary);}\n.bio-quote{\n  margin-top:34px;padding:24px 26px 24px 28px;\n  border-left:2px solid var(--color-primary);\n  background:linear-gradient(90deg, rgba(0,212,216,0.06), transparent 80%);\n  border-radius:0 12px 12px 0;\n  font-family:var(--font-display);font-size:18px;color:var(--color-text);\n  letter-spacing:-0.01em;position:relative;\n}\n.bio-quote .qmark{position:absolute;top:-14px;left:-14px;width:32px;height:32px;border-radius:50%;background:var(--color-primary);color:#001214;display:grid;place-items:center;font-family:var(--font-display);font-weight:700;font-size:18px;box-shadow:0 8px 20px -8px var(--color-primary-glow);}\n\n.bio-points{list-style:none;display:grid;gap:14px;margin:28px 0 0;}\n.bio-points li{display:flex;align-items:flex-start;gap:14px;font-size:15px;color:var(--color-text-muted);line-height:1.55;}\n.bio-points li .ic-wrap{\n  width:30px;height:30px;border-radius:8px;flex-shrink:0;\n  background:rgba(0,212,216,0.08);border:1px solid rgba(0,212,216,0.22);\n  color:var(--color-primary);display:grid;place-items:center;\n}\n.bio-points li .ic-wrap .ic{width:14px;height:14px;}\n.bio-points li b{color:var(--color-text);font-weight:500;}\n\n.skill-rings{display:grid;grid-template-columns:repeat(3, 1fr);gap:22px;}\n.ring{\n  background:var(--color-surface);\n  border:1px solid var(--color-border);\n  border-radius:var(--radius);\n  padding:20px 18px;\n  text-align:center;\n}\n.ring-vis{position:relative;width:88px;height:88px;margin:0 auto 14px;}\n.ring-vis svg{transform:rotate(-90deg);width:100%;height:100%;}\n.ring-vis circle{fill:none;stroke-width:6;}\n.ring-vis .bg{stroke:rgba(255,255,255,0.06);}\n.ring-vis .fg{stroke:var(--color-primary);stroke-linecap:round;filter:drop-shadow(0 0 6px var(--color-primary-glow));}\n.ring-pct{\n  position:absolute;inset:0;display:grid;place-items:center;\n  font-family:var(--font-mono);font-size:14px;color:var(--color-text);font-weight:500;\n}\n.ring-name{font-size:13px;color:var(--color-text-muted);}\n\n.stats-strip{\n  margin-top:80px;\n  display:grid;grid-template-columns:repeat(4, 1fr);\n  border:1px solid var(--color-border);border-radius:var(--radius-lg);\n  background:linear-gradient(180deg, var(--color-surface), var(--color-bg));\n  overflow:hidden;\n}\n.stat{padding:34px 26px;border-right:1px solid var(--color-border);position:relative;}\n.stat:last-child{border-right:0;}\n.stat .stat-ico{\n  width:40px;height:40px;border-radius:10px;\n  background:rgba(0,212,216,0.08);border:1px solid rgba(0,212,216,0.22);\n  display:grid;place-items:center;color:var(--color-primary);margin-bottom:18px;\n}\n.stat .stat-ico .ic{width:18px;height:18px;}\n.stat .num{font-family:var(--font-display);font-size:54px;font-weight:500;letter-spacing:-0.03em;}\n.stat .num .plus{color:var(--color-primary);}\n.stat .label{margin-top:8px;font-size:13px;color:var(--color-text-muted);}\n.stat::after{\n  content:\"\";position:absolute;top:0;left:0;height:1px;width:30px;background:var(--color-primary);\n}\n\n/* ============================================================\n   SKILLS / STACK\n   ============================================================ */\n.stack-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:24px;}\n.stack-group{\n  background:var(--color-surface);\n  border:1px solid var(--color-border);\n  border-radius:var(--radius);\n  padding:24px;\n  display:flex;flex-direction:column;gap:18px;\n  transition:border-color .25s ease;\n}\n.stack-group:hover{border-color:var(--color-border-2);}\n.stack-group h3{\n  font-family:var(--font-mono);font-size:11px;letter-spacing:0.18em;text-transform:uppercase;\n  color:var(--color-primary);font-weight:500;\n}\n.stack-group h3 span{color:var(--color-text-dim);margin-left:8px;}\n.stack-items{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;}\n.tech{\n  position:relative;\n  display:flex;flex-direction:column;align-items:center;justify-content:center;\n  gap:8px;padding:14px 6px;\n  background:var(--color-surface-2);\n  border:1px solid var(--color-border);\n  border-radius:10px;\n  transition:transform .25s ease, border-color .25s ease, background .25s ease;\n  transform-style:preserve-3d;\n}\n.tech:hover{\n  border-color:rgba(0,212,216,0.4);\n  background:linear-gradient(180deg, rgba(0,212,216,0.08), var(--color-surface-2));\n  transform:translateY(-2px);\n}\n.tech-icon{width:34px;height:34px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,0.02);}\n.tech-icon img{width:28px;height:28px;filter:grayscale(1) brightness(2.4);transition:filter .25s ease, transform .25s ease;}\n.tech-icon .mono{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--color-text);letter-spacing:-0.02em;}\n.tech:hover .tech-icon img{filter:none;transform:scale(1.08);}\n.tech:hover .tech-icon .mono{color:var(--color-primary);}\n.tech:hover .tech-icon{background:rgba(0,212,216,0.08);}\n.tech-name{font-size:11px;color:var(--color-text-muted);letter-spacing:0.02em;text-align:center;}\n\n/* ============================================================\n   PROJECTS\n   ============================================================ */\n.proj-grid{display:grid;grid-template-columns:repeat(6, 1fr);gap:28px;}\n.proj-card{\n  position:relative;\n  background:var(--color-surface);\n  border:1px solid var(--color-border);\n  border-radius:var(--radius-lg);\n  overflow:hidden;\n  transform-style:preserve-3d;\n  transition:border-color .25s ease, box-shadow .35s ease;\n  will-change:transform;\n}\n.proj-card:hover{border-color:var(--color-border-2);box-shadow:0 30px 60px -30px rgba(0,212,216,0.25);}\n.proj-card.span-3{grid-column:span 3;}\n.proj-card.span-2{grid-column:span 2;}\n.proj-card.span-6{grid-column:span 6;}\n.proj-banner{\n  position:relative;height:220px;overflow:hidden;\n  border-bottom:1px solid var(--color-border);\n}\n.proj-banner.tall{height:280px;}\n.proj-banner-art{position:absolute;inset:0;display:grid;place-items:center;}\n.proj-banner-art svg{width:78%;height:78%;opacity:0.92;transition:transform .6s ease;}\n.proj-card:hover .proj-banner-art svg{transform:scale(1.04) rotate(-1deg);}\n.proj-tag{\n  position:absolute;top:16px;left:16px;\n  font-family:var(--font-mono);font-size:10px;letter-spacing:0.18em;text-transform:uppercase;\n  padding:6px 10px;border-radius:99px;\n  background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);\n  border:1px solid rgba(255,255,255,0.12);\n  color:var(--color-text);\n}\n.proj-body{padding:24px;}\n.proj-body h3{font-size:22px;letter-spacing:-0.02em;margin-bottom:8px;}\n.proj-body p{color:var(--color-text-muted);font-size:14px;line-height:1.55;}\n.proj-stack{display:flex;flex-wrap:wrap;gap:6px;margin-top:18px;}\n.badge{\n  font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;\n  color:var(--color-text-muted);\n  padding:5px 9px;border-radius:6px;\n  background:var(--color-surface-2);\n  border:1px solid var(--color-border);\n}\n.proj-foot{\n  display:flex;align-items:center;justify-content:space-between;\n  margin-top:22px;padding-top:18px;border-top:1px solid var(--color-border);\n}\n.proj-metric{font-family:var(--font-mono);font-size:12px;color:var(--color-primary);letter-spacing:0.04em;}\n.proj-metric .arrow{display:inline-block;margin-right:6px;}\n.proj-link{\n  display:inline-flex;align-items:center;gap:6px;\n  font-size:13px;color:var(--color-text);font-weight:500;\n  transition:color .2s;\n}\n.proj-link:hover{color:var(--color-primary);}\n.proj-link svg{width:14px;height:14px;transition:transform .2s;}\n.proj-link:hover svg{transform:translate(2px,-2px);}\n\n/* banner art gradients */\n.bnr-1{background:radial-gradient(120% 100% at 0% 0%, #00d4d8 0%, #007e80 35%, #0a0a0f 80%);}\n.bnr-2{background:radial-gradient(100% 120% at 100% 0%, #ffd700 0%, #b07b00 30%, #0a0a0f 80%);}\n.bnr-3{background:radial-gradient(100% 120% at 50% 0%, #7df9ff 0%, #00787a 30%, #0a0a0f 75%);}\n.bnr-4{background:linear-gradient(135deg, #00d4d8 0%, #182030 60%, #0a0a0f 100%);}\n.bnr-5{background:radial-gradient(120% 100% at 100% 100%, #00d4d8 0%, #36206b 35%, #0a0a0f 80%);}\n\n/* Modal */\n.modal-backdrop{\n  position:fixed;inset:0;z-index:80;background:rgba(5,5,9,0.75);\n  backdrop-filter:blur(10px);\n  display:none;align-items:center;justify-content:center;\n  padding:32px;\n}\n.modal-backdrop.open{display:flex;animation:fade .25s ease;}\n@keyframes fade{from{opacity:0;}to{opacity:1;}}\n.modal{\n  width:min(820px, 100%);max-height:88vh;overflow:auto;\n  background:var(--color-surface);\n  border:1px solid var(--color-border-2);\n  border-radius:var(--radius-lg);\n  padding:38px;\n  position:relative;\n  box-shadow:0 50px 100px -30px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,212,216,0.18) inset;\n}\n.modal-close{\n  position:absolute;top:18px;right:18px;\n  width:36px;height:36px;border-radius:50%;\n  border:1px solid var(--color-border-2);\n  display:grid;place-items:center;\n  transition:background .2s, color .2s;\n}\n.modal-close:hover{background:var(--color-primary);color:#00171a;}\n.modal h3{font-size:32px;letter-spacing:-0.02em;margin-bottom:8px;}\n.modal .sub{color:var(--color-text-muted);font-family:var(--font-mono);font-size:12px;letter-spacing:0.1em;text-transform:uppercase;}\n.modal .stack-row{display:flex;gap:6px;flex-wrap:wrap;margin:18px 0 22px;}\n.modal-body{color:var(--color-text);font-size:15px;line-height:1.7;}\n.modal-body h4{font-family:var(--font-display);font-size:14px;font-weight:600;margin:22px 0 8px;color:var(--color-primary);text-transform:uppercase;letter-spacing:0.1em;}\n.modal-body ul{padding-left:20px;}\n.modal-body ul li{margin-bottom:6px;color:var(--color-text-muted);}\n.modal-body ul li b{color:var(--color-text);font-weight:500;}\n\n/* ============================================================\n   TIMELINE\n   ============================================================ */\n.timeline{position:relative;padding:20px 0;}\n.tl-line{\n  position:absolute;top:0;bottom:0;left:50%;width:2px;\n  background:rgba(255,255,255,0.06);transform:translateX(-50%);\n  overflow:hidden;\n}\n.tl-line .fill{\n  position:absolute;top:0;left:0;width:100%;height:0%;\n  background:linear-gradient(180deg, var(--color-primary), rgba(0,212,216,0.0));\n  box-shadow:0 0 12px var(--color-primary-glow);\n}\n.tl-item{\n  position:relative;width:50%;padding:30px 56px;\n}\n.tl-item.left{left:0;text-align:right;}\n.tl-item.right{left:50%;text-align:left;}\n.tl-node{\n  position:absolute;top:42px;width:14px;height:14px;border-radius:50%;\n  background:var(--color-bg);border:2px solid var(--color-primary);\n  box-shadow:0 0 0 4px rgba(0,212,216,0.12);\n}\n.tl-item.left .tl-node{right:-7px;}\n.tl-item.right .tl-node{left:-7px;}\n.tl-card{\n  display:inline-block;\n  background:var(--color-surface);\n  border:1px solid var(--color-border);\n  border-radius:var(--radius);\n  padding:22px 24px;\n  text-align:left;\n  max-width:440px;\n}\n.tl-period{font-family:var(--font-mono);font-size:11px;color:var(--color-primary);letter-spacing:0.12em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}\n.tl-period .ic{width:12px;height:12px;}\n.tl-head{display:flex;align-items:center;gap:14px;margin:10px 0 14px;}\n.tl-logo{\n  width:42px;height:42px;border-radius:10px;flex-shrink:0;\n  background:var(--color-surface-2);border:1px solid var(--color-border-2);\n  display:grid;place-items:center;color:var(--color-primary);\n  font-family:var(--font-display);font-weight:600;font-size:16px;letter-spacing:-0.02em;\n}\n.tl-logo .ic{width:18px;height:18px;}\n.tl-role{font-family:var(--font-display);font-size:20px;letter-spacing:-0.01em;line-height:1.15;}\n.tl-co{font-size:13px;color:var(--color-text-muted);margin-top:3px;}\n.tl-bullets{padding-left:0;list-style:none;}\n.tl-bullets li{position:relative;padding-left:22px;font-size:13.5px;color:var(--color-text-muted);margin-bottom:8px;line-height:1.55;}\n.tl-bullets li .ic{position:absolute;left:0;top:3px;width:13px;height:13px;color:var(--color-primary);}\n.tl-card ul{padding-left:18px;}\n.tl-card ul li{font-size:13.5px;color:var(--color-text-muted);margin-bottom:6px;line-height:1.55;}\n.tl-card ul li::marker{color:var(--color-primary);}\n\n/* ============================================================\n   CERTS\n   ============================================================ */\n.cert-row{display:flex;gap:18px;overflow-x:auto;padding:8px 4px 24px;scroll-snap-type:x mandatory;}\n.cert-row::-webkit-scrollbar{height:6px;}\n.cert-row::-webkit-scrollbar-thumb{background:var(--color-border-2);border-radius:99px;}\n.cert{\n  flex:0 0 280px;scroll-snap-align:start;\n  background:var(--color-surface);\n  border:1px solid var(--color-border);\n  border-radius:var(--radius);\n  padding:24px;\n  transition:transform .25s ease, border-color .25s ease, box-shadow .3s ease;\n}\n.cert:hover{\n  transform:translateY(-4px);\n  border-color:rgba(0,212,216,0.4);\n  box-shadow:0 20px 40px -20px rgba(0,212,216,0.4);\n}\n.cert .ico{\n  width:44px;height:44px;border-radius:10px;\n  background:var(--color-surface-2);border:1px solid var(--color-border);\n  display:grid;place-items:center;margin-bottom:14px;\n}\n.cert .ico img{width:22px;height:22px;filter:grayscale(1) brightness(2.2);}\n.cert .ico .mono{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--color-primary);letter-spacing:-0.02em;}\n.cert h4{font-family:var(--font-display);font-size:16px;font-weight:500;margin-bottom:6px;line-height:1.3;}\n.cert .iss{font-size:13px;color:var(--color-text-muted);margin-bottom:14px;min-height:36px;}\n.cert .date{font-family:var(--font-mono);font-size:11px;color:var(--color-text-dim);letter-spacing:0.1em;text-transform:uppercase;}\n\n/* ============================================================\n   CONTACT\n   ============================================================ */\n.contact{\n  position:relative;overflow:hidden;\n  padding:140px 0;\n  border-top:1px solid var(--color-border);\n}\n.contact::before{\n  content:\"\";position:absolute;inset:0;z-index:0;pointer-events:none;\n  background:\n    radial-gradient(700px 500px at 20% 30%, rgba(0,212,216,0.18), transparent 60%),\n    radial-gradient(600px 500px at 80% 70%, rgba(0,212,216,0.10), transparent 60%);\n  animation:driftbg 16s ease-in-out infinite alternate;\n}\n@keyframes driftbg{from{transform:translate(0,0);}to{transform:translate(-3%,3%);}}\n.contact-inner{position:relative;z-index:1;text-align:center;}\n.contact h2{\n  font-size:clamp(40px, 6.5vw, 88px);\n  max-width:18ch;margin:0 auto 28px;\n}\n.contact h2 .grad{\n  background:linear-gradient(120deg, #e8e8f0 30%, var(--color-primary) 75%);\n  -webkit-background-clip:text;background-clip:text;color:transparent;\n}\n.contact p.lede{\n  color:var(--color-text-muted);font-size:18px;\n  max-width:54ch;margin:0 auto 40px;\n}\n.contact-cta{display:inline-flex;gap:14px;flex-wrap:wrap;justify-content:center;}\n.copy-toast{\n  position:fixed;bottom:32px;left:50%;transform:translate(-50%, 60px);\n  background:var(--color-surface-2);\n  border:1px solid rgba(0,212,216,0.4);\n  color:var(--color-text);padding:12px 20px;border-radius:99px;\n  font-size:13px;display:flex;align-items:center;gap:10px;\n  opacity:0;transition:transform .3s ease, opacity .3s ease;z-index:90;\n}\n.copy-toast.show{opacity:1;transform:translate(-50%, 0);}\n.copy-toast .dot{width:8px;height:8px;border-radius:50%;background:var(--color-primary);}\n\n.contact-meta{\n  margin-top:60px;display:flex;justify-content:center;gap:18px;flex-wrap:wrap;\n}\n.contact-tile{\n  display:flex;align-items:center;gap:14px;\n  padding:16px 22px;border-radius:14px;\n  background:rgba(17,17,24,0.6);backdrop-filter:blur(8px);\n  border:1px solid var(--color-border);\n  text-align:left;min-width:200px;\n}\n.contact-tile .ic-wrap{\n  width:38px;height:38px;border-radius:10px;\n  background:rgba(0,212,216,0.1);border:1px solid rgba(0,212,216,0.25);\n  display:grid;place-items:center;color:var(--color-primary);flex-shrink:0;\n}\n.contact-tile .ic-wrap .ic{width:16px;height:16px;}\n.contact-tile .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-text-dim);}\n.contact-tile .val{font-size:14px;color:var(--color-text);margin-top:2px;}\n\nfooter{\n  padding:34px 0;border-top:1px ly faster with SQL, BI, and AI that earns its keep.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"about-grid\">\n      <div class=\"bio reveal\">\n        <p>I'm a <span class=\"hl\">Senior Analyst<\u002Fspan> with <span class=\"hl\">9+ years<\u002Fspan> in business intelligence, market research, and AI-powered analytics across IT services — currently leading BI and AI delivery for the CPO &amp; regional marketing leadership at Yash Technologies.<\u002Fp>\n        <p>I build things that save real time: a centralized SQL warehouse that cut data retrieval by <b>80%<\u002Fb>, Power BI dashboards that replaced weeks of manual reporting, and a Python + LangChain agentic pipeline that takes the insight-to-deck cycle from <b>15 days down to 3-4<\u002Fb>.<\u002Fp>\n\n        <ul class=\"bio-points\">\n          <li><span class=\"ic-wrap\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><ellipse cx=\"12\" cy=\"5\" rx=\"8\" ry=\"3\"><\u002Fellipse><path d=\"M4 5v14c0 1.66 3.58 3 8 3s8-1.34 8-3V5\"><\u002Fpath><path d=\"M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3\"><\u002Fpath><\u002Fsvg><\u002Fspan><div><b>Data infrastructure.<\u002Fb> Centralized 10+ messy sources into one SQL warehouse — analysts stopped firefighting refreshes.<\u002Fdiv><\u002Fli>\n          <li><span class=\"ic-wrap\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M9 18V5l12-2v13\"><\u002Fpath><circle cx=\"6\" cy=\"18\" r=\"3\"><\u002Fcircle><circle cx=\"18\" cy=\"16\" r=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fspan><div><b>BI delivery.<\u002Fb> DAX-driven Power BI dashboards with drill-downs across portfolio, pipeline &amp; campaign performance.<\u002Fdiv><\u002Fli>\n          <li><span class=\"ic-wrap\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg><\u002Fspan><div><b>Agentic AI.<\u002Fb> LangChain agents + OpenAI &amp; Claude APIs, RAG over PDFs/CRM, python-pptx for finished decks.<\u002Fdiv><\u002Fli>\n          <li><span class=\"ic-wrap\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M3 12a9 9 0 1 0 9-9\"><\u002Fpath><path d=\"M3 12 8 7M3 12l5 5\"><\u002Fpath><\u002Fsvg><\u002Fspan><div><b>Model benchmarking.<\u002Fb> Real-task comparison of GPT-4, Claude 3 &amp; Gemini — best-fit model per workload, lower API cost.<\u002Fdiv><\u002Fli>\n        <\u002Ful>\n\n        <div class=\"bio-quote\">\n          <span class=\"qmark\">“<\u002Fspan>\n          I don't sell AI demos. I deliver pipelines that quietly retire 80% of the manual work behind a number.\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"skill-rings reveal\">\n        <!-- 6 rings, dataset percent -->\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"stats-strip reveal\">\n      <div class=\"stat\">\n        <div class=\"stat-ico\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 7v5l3 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"num\" data-count=\"9\">0<span class=\"plus\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"label\">Years in BI &amp; Analytics<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"stat-ico\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M3 17l6-6 4 4 8-8\"><\u002Fpath><path d=\"M14 7h7v7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"num\"><span data-count=\"80\">0<\u002Fspan>%<\u002Fdiv>\n        <div class=\"label\">Cut in manual data-retrieval effort<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat\">\n        <div class=\"stat-ico\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1 on, not the trend.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"stack-grid\">\n      <!-- groups injected by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     PROJECTS\n     ============================================================ -->\n<section id=\"projects\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <div>\n        <span class=\"section-icon\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M3 7l9-4 9 4-9 4-9-4Z\"><\u002Fpath><path d=\"M3 12l9 4 9-4\"><\u002Fpath><path d=\"M3 17l9 4 9-4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span class=\"section-num\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg> 03 / Selected Work<\u002Fspan>\n        <h2>Pipelines that actually <span style=\"color:var(--color-primary)\">retire manual work<\u002Fspan>.<\u002Fh2>\n      <\u002Fdiv>\n      <p>Five projects from the last two years at Yash Technologies and beyond — each built end-to-end, each shipped to production stakeholders.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"proj-grid\" id=\"proj-grid\">\n      <!-- cards injected by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============================================================\n     EXPERIENCE TIMELINE\n     ============================================================ -->\n<section id=\"experience\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <div>\n        <span class=\"section-icon\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><rect x=\"3\" y=\"7\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"><\u002Fpath><path d=\"M3 13h18\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <span class=\"section-num\"><svg class=\"ic\" viewBox=\"0 0 24 24\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg> 04 / Trajectory<\u002Fspan>\n        <h2>From GIS 2Fdiv>\n\n<!-- Toast -->\n<div class=\"copy-toast\" id=\"toast\"><span class=\"dot\"><\u002Fspan> Email copied to clipboard<\u002Fdiv>\n\n<!-- ============================================================\n     LIBS\n     ============================================================ -->\n<script src=\"ded38e6f-5c90-4d7c-8405-0813d0261972\"><\u002Fscript>\n<script src=\"9fa384a1-dedd-472e-b793-aeabf65603ef\"><\u002Fscript>\n<script src=\"ab710a8c-c890-4ae1-aafd-1b36217cea4e\"><\u002Fscript>\n<script src=\"e3c09622-365c-4a88-b292-98b7250365fc\"><\u002Fscript>\n\n<script>\n/* ============================================================\n   DATA\n   ============================================================ */\nconst SKILL_RINGS = [\n  {name:'SQL & DAX', pct:95},\n  {name:'Power BI', pct:92},\n  {name:'Python', pct:85},\n  {name:'LangChain / RAG', pct:82},\n  {name:'Prompt Engineering', pct:90},\n  {name:'NLP & LLM APIs', pct:80},\n];\n\nconst STACK = [\n  {\n    group:'BI & Analytics', count:6,\n    items:[\n      {name:'Power BI', mono:'PB'},\n      {name:'SQL', slug:'mysql'},\n      {name:'DAX', mono:'ƒx'},\n      {name:'Excel', mono:'XL'},\n      {name:'Fabric', mono:'MF'},\n      {name:'Tableau', mono:'TB'},\n    ]\n  },\n  {\n    group:'AI & Automation', count:6,\n    items:[\n      {name:'LangChain', slug:'langchain'},\n      {name:'OpenAI', mono:'AI'},\n      {name:'Claude', slug:'anthropic'},\n      {name:'Gemini', slug:'googlegemini'},\n      {name:'Perplexity', slug:'perplexity'},\n      {name:'n8n', slug:'n8n'},\n    ]\n  },\n  {\n    group:'Programming', count:6,\n    items:[\n      {name:'Python', slug:'python'},\n      {name:'pandas', slug:'pandas'},\n      {name:'JSON / REST', slug:'json'},\n      {name:'venv', slug:'python'},\n      {name:'NLP', slug:'spacy'},\n      {name:'python-pptx', mono:'PP'},\n    ]\n  },\n  {\n    group:'Process & Delivery', count:6,\n    items:[\n      {name:'Agile', slug:'jira'},\n      {name:'Git', slug:'git'},\n      {name:' nch',\n    title:'LLM Benchmarking Suite',\n    desc:'Real-task benchmark of GPT-4, Claude 3 and Gemini to pick the right model per analytics workload — quality up, API cost down.',\n    tag:'Research',\n    stack:['GPT-4','Claude 3','Gemini','Prompting'],\n    metric:'Best-fit model per use case',\n    bnr:'bnr-5',\n    art:'art-models',\n    span:'span-2'\n  },\n];\n\nconst CERTS = [\n  {name:'Power BI Business Intelligence — Beginners to Advanced', issuer:'Udemy', date:'2024', slug:'udemy'},\n  {name:'Power BI DAX Query View &amp; Copilot Integration', issuer:'Microsoft Learning', date:'2024', mono:'PB'},\n  {name:'AI Fluency Framework', issuer:'Self-directed structured curriculum', date:'2025', slug:'anthropic'},\n  {name:'Claude 101 — Working with Claude APIs', issuer:'Anthropic Resources', date:'2024', slug:'anthropic'},\n  {name:'Google AI Essentials', issuer:'Google', date:'2024', slug:'google'},\n  {name:'Prompt Engineering for Analysts', issuer:'Udemy', date:'2024', slug:'udemy'},\n  {name:'LangChain for Production Apps', issuer:'Self-paced', date:'2025', slug:'langchain'},\n];\n\n/* ============================================================\n   RENDER: rings\n   ============================================================ */\n(function renderRings(){\n  const el = document.querySelector('.skill-rings');\n  const R = 38, C = 2*Math.PI*R;\n  el.innerHTML = SKILL_RINGS.map(s => `\n    <div class=\"ring\">\n      <div class=\"ring-vis\">\n        <svg viewBox=\"0 0 88 88\">\n          <circle class=\"bg\" cx=\"44\" cy=\"44\" r=\"${R}\"/>\n          <circle class=\"fg\" cx=\"44\" cy=\"44\" r=\"${R}\" stroke-dasharray=\"${C}\" stroke-dashoffset=\"${C}\" data-target=\"${C - (s.pct/100)*C}\"/>\n        <\u002Fsvg>\n        <div class=\"ring-pct\" data-pct=\"${s.pct}\">0%<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ring-name\">${s.name}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n})();\n\n/* ============================================================\n   RENDER: stack\n   ============================================================ */\n(function renderStack(){\n  const el = document.querySelector('.stack-grid');\n  el.innerHTML = STACK.map(g => `\n    <div class=\"stack-group\">\n      <h3>${g.group}<span>${g.items.length}<\u002Fspan><\u002Fh3>\n      <div class=\"stack-items\">\n        ${g.items.map(i => `\n          <div class=\"tech\" data-tilt>\n            <div class=\"tech-icon\">${i.slug ? `<img alt=\"\" loading=\"lazy\" src=\"${(window.__resources && window.__resources['si_'+i.slug]) || ('https://cdn.simpleicons.org/'+i.slug+'/ffffff')}\"/>` : `<span class=\"mono\">${i.mono}<\u002Fspan>`}<\u002Fdiv>\n            <div class=\"tech-name\">${i.name}<\u002Fdiv>\n          <\u002Fdiv>\n        `).join('')}\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n})();\n\n/* ============================================================\n   RENDER: project art (CSS+SVG, no images)\n   ============================================================ */\nconst ART = {\n  'art-flow': `<svg viewBox=\"0 0 400 240\" fill=\"none\">\n    <g stroke=\"white\" stroke-width=\"1\" opacity=\".25\">\n      <path d=\"M40 60h80M120 60c30 0 30 60 60 60M180 120h80M260 120c30 0 30 60 60 60\"/>\n    <\u002Fg>\n    <g>\n      <rect x=\"20\" y=\"40\" width=\"80\" height=\"40\" rx=\"8\" fill=\"rgba(255,255,255,.12)\" stroke=\"rgba(255,255,255,.35)\"/>\n      <rect x=\"140\" y=\"100\" width=\"80\" height=\"40\" rx=\"8\" fill=\"rgba(255,255,255,.12)\" stroke=\"rgba(255,255,255,.35)\"/>\n      <rect x=\"260\" y=\"160\" width=\"100\" height=\"40\" rx=\"8\" fill=\"#00d4d8\" stroke=\"#7df9ff\"/>\n      <text x=\"60\" y=\"65\" text-anchor=\"middle\" fill=\"white\" font-size=\"11\" font-family=\"JetBrains Mono\">PROMPT<\u002Ftext>\n      <text x=\"180\" y=\"125\" text-anchor=\"middle\" fill=\"white\" font-size=\"11\" font-family=\"JetBrains Mono\">AGENT<\u002Ftext>\n      <text x=\"310\" y=\"185\" text-anchor=\"middle\" fill=\"#001214\" font-size=\"11\" font-family=\"JetBrains Mono\" font-weight=\"700\">DECK.PPTX<\u002Ftext>\n    <\u002Fg>\n    <g fill=\"white\" opacity=\".7\">\n      <circle cx=\"120\" cy=\"60\" r=\"3\"/><circle cx=\"180\" cy=\"120\" r=\"3\"/><circle cx=\"260\" cy=\"120\" r=\"3\"/><circle cx=\"320\" cy=\"180\" r=\"3\"/>\n    <\u002Fg>\n  <\u002Fsvg>`,\n  'art-rag': `<svg viewBox=\"0 0 400 240\">\n    <g fill=\"none\" stroke=\"white\" stroke-width=\"1\" opacity=\".25\">\n      ${[...Array(8)].map((_,i)=>`<rect x=\"${30+i*15}\" y=\"${40+(i%3)*8}\" width=\"60\" height=\"80\" rx=\"4\"/>`).join('')}\n    <\u002Fg>\n    <g>\n      <circle cx=\"220\" cy=\"120\" r=\"46\" fill=\"rgba(0,0,0,.45)\" stroke=\"#00d4d8\" stroke-dasharray=\"3 4\"/>\n      <text x=\"220\" y=\"116\" text-anchor=\"middle\" fill=\"#00d4d8\" font-family=\"JetBrains Mono\" font-size=\"12\">RAG<\u002Ftext>\n      <text x=\"220\" y=\"132\" text-anchor=\"middle\" fill=\"white\" opacity=\".7\" font-family=\"JetBrains Mono\" font-size=\"9\">retriever<\u002Ftext>\n    <\u002Fg>\n    <g stroke=\"#00d4d8\" stroke-width=\"1.2\" opacity=\".7\">\n      <path d=\"M110 100 L175 115\"/><path d=\"M110 130 L175 122\"/><path d=\"M270 120 L330 90\"/><path d=\"M270 125 L330 150\"/>\n    <\u002Fg>\n    <g fill=\"white\" opacity=\".85\">\n      <rect x=\"330\" y=\"74\" width=\"50\" height=\"32\" rx=\"5\" stroke=\"white\" fill=\"none\"/>\n      <text x=\"355\" y=\"95\" text-anchor=\"middle\" font-size=\"10\" font-family=\"JetBrains Mono\">LLM<\u002Ftext>\n      <rect x=\"330\" y=\"134\" width=\"50\" height=\"32\" rx=\"5\" stroke=\"white\" fill=\"none\"/>\n      <text x=\"355\" y=\"155\" text-anchor=\"middle\" font-size=\"10\" font-family=\"JetBrains Mono\">DB<\u002Ftext>\n    <\u002Fg>\n  <\u002Fsvg>`,\n  'art-grid': `<svg viewBox=\"0 0 400 240\">\n    <g fill=\"none\" stroke=\"white\" opacity=\".18\" stroke-width=\"1\">\n      ${[...Array(11)].map((_,i)=>`<path d=\"M${30+i*32} 30 v180\"/>`).join('')}\n      ${[...Array(7)].map((_,i)=>`<path d=\"M30 ${30+i*30} h320\"/>`).join('')}\n    <\u002Fg>\n    <g fill=\"#00d4d8\">\n      ${[[1,5],[2,4],[3,5],[4,3],[5,4],[6,2],[7,3],[8,1],[9,2]].map(([x,y])=>`<rect x=\"${30+x*32-10}\" y=\"${30+y*30-10}\" width=\"20\" height=\"20\" rx=\"4\" opacity=\".85\"/>`).join('')}\n    <\u002Fg>\n    <text x=\"40\" y=\"225\" font-family=\"JetBrains Mono\" font-size=\"10\" fill=\"white\" opacity=\".5\">10+ sources → 1 warehouse<\u002Ftext>\n  <\u002Fsvg>`,\n  'art-chart': `<svg viewBox=\"0 0 400 240\">\n    <g stroke=\"white\" opacity=\".18\">\n      <path d=\"M40 200 H360\"/><path d=\"M40 40 V200\"/>\n    <\u002Fg>\n    <g>\n      <path d=\"M40 170 L100 130 L160 150 L220 90 L280 110 L340 50\" fill=\"none\" stroke=\"#00d4d8\" stroke-width=\"2.5\"/>\n      <path d=\"M40 170 L100 130 L160 150 L220 90 L280 110 L340 50 L340 200 L40 200 Z\" fill=\"url(#g1)\" opacity=\".4\"/>\n      <defs><linearGradient id=\"g1\" x1=\"0\" x2=\"0\" y1=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#00d4d8\"/><stop offset=\"1\" stop-color=\"#00d4d8\" stop-opacity=\"0\"/><\u002FlinearGradient><\u002Fdefs>\n    <\u002Fg>\n    <g fill=\"white\">\n      ${[[100,130],[160,150],[220,90],[280,110],[340,50]].map(([x,y])=>`<circle cx=\"${x}\" cy=\"${y}\" r=\"3.5\"/>`).join('')}\n    <\u002Fg>\n    <text x=\"50\" y=\"58\" font-family=\"JetBrains Mono\" font-size=\"10\" fill=\"white\" opacity=\".6\">Q1 → Q4 · Pipeline ARR<\u002Ftext>\n  <\u002Fsvg>`,\n  'art-models': `<svg viewBox=\"0 0 400 240\">\n    <g font-family=\"JetBrains Mono\" font-size=\"11\" fill=\"white\">\n      <g transform=\"translate(40,40)\">\n        <rect width=\"110\" height=\"160\" rx=\"10\" fill=\"rgba(255,255,255,.05)\" stroke=\"rgba(255,255,255,.18)\"/>\n        <text x=\"55\" y=\"22\" text-anchor=\"middle\" fill=\"#00d4d8\">GPT-4<\u002Ftext>\n        <rect x=\"20\" y=\"40\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"40\" width=\"62\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <rect x=\"20\" y=\"60\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"60\" width=\"48\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <rect x=\"20\" y=\"80\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"80\" width=\"58\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <text x=\"55\" y=\"130\" text-anchor=\"middle\" font-size=\"22\" fill=\"white\">89<\u002Ftext>\n      <\u002Fg>\n      <g transform=\"translate(150,40)\">\n        <rect width=\"110\" height=\"160\" rx=\"10\" fill=\"rgba(0,212,216,.08)\" stroke=\"#00d4d8\"/>\n        <text x=\"55\" y=\"22\" text-anchor=\"middle\" fill=\"#00d4d8\">CLAUDE 3<\u002Ftext>\n        <rect x=\"20\" y=\"40\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"40\" width=\"68\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <rect x=\"20\" y=\"60\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"60\" width=\"64\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <rect x=\"20\" y=\"80\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"80\" width=\"60\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <text x=\"55\" y=\"130\" text-anchor=\"middle\" font-size=\"22\" fill=\"white\">93<\u002Ftext>\n      <\u002Fg>\n      <g transform=\"translate(260,40)\">\n        <rect width=\"110\" height=\"160\" rx=\"10\" fill=\"rgba(255,255,255,.05)\" stroke=\"rgba(255,255,255,.18)\"/>\n        <text x=\"55\" y=\"22\" text-anchor=\"middle\" fill=\"#00d4d8\">GEMINI<\u002Ftext>\n        <rect x=\"20\" y=\"40\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"40\" width=\"55\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <rect x=\"20\" y=\"60\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"60\" width=\"42\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <rect x=\"20\" y=\"80\" width=\"70\" height=\"6\" rx=\"3\" fill=\"rgba(255,255,255,.15)\"/><rect x=\"20\" y=\"80\" width=\"50\" height=\"6\" rx=\"3\" fill=\"#00d4d8\"/>\n        <text x=\"55\" y=\"130\" text-anchor=\"middle\" font-size=\"22\" fill=\"white\">81<\u002Ftext>\n      <\u002Fg>\n      <text x=\"200\" y=\"220\" text-anchor=\"middle\" font-size=\"10\" fill=\"white\" opacity=\".55\">Real-task benchmark · quality score (mock)<\u002Ftext>\n    <\u002Fg>\n  <\u002Fsvg>`,\n};\n\n(function renderProjects(){\n  const el = document.getElementById('proj-grid');\n  el.innerHTML = PROJECTS.map(p => `\n    <article class=\"proj-card ${p.span}\" data-id=\"${p.id}\" data-tilt>\n      <div class=\"proj-banner ${p.bannerTall ? 'tall' : ''} ${p.bnr}\">\n        <div class=\"proj-tag\">${p.tag}<\u002Fdiv>\n        <div class=\"proj-banner-art\">${ART[p.art] || ''}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"proj-body\">\n        <h3>${p.title}<\u002Fh3>\n        <p>${p.desc}<\u002Fp>\n        <div class=\"proj-stack\">${p.stack.map(s=>`<span class=\"badge\">${s}<\u002Fspan>`).join('')}<\u002Fdiv>\n        <div class=\"proj-foot\">\n          <span class=\"proj-metric\"><span class=\"arrow\">↳<\u002Fspan>${p.metric}<\u002Fspan>\n          ${p.body ? `<button class=\"proj-link\" data-open=\"${p.id}\">View details\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M7 17 17 7M9 7h8v8\"/><\u002Fsvg>\n          <\u002Fbutton>` : `<span class=\"proj-link\" style=\"color:var(--color-text-dim)\">Case study coming\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 6v12m6-6H6\"/><\u002Fsvg>\n          <\u002Fspan>`}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n  `).join('');\n})();\n\n/* ============================================================\n   RENDER: certs\n   ============================================================ */\n(function renderCerts(){\n  const el = document.getElementById('cert-row');\n  el.innerHTML = CERTS.map(c => `\n    <div class=\"cert\">\n      <div class=\"ico\">${c.slug ? `<img loading=\"lazy\" alt=\"\" src=\"${(window.__resources && window.__resources['si_'+c.slug]) || ('https://cdn.simpleicons.org/'+c.slug+'/ffffff')}\"/>` : `<span class=\"mono\">${c.mono}<\u002Fspan>`}<\u002Fdiv>\n      <h4>${c.name}<\u002Fh4>\n      <div class=\"iss\">${c.issuer}<\u002Fdiv>\n      <div class=\"date\">${c.date}<\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n})();\n\n/* ============================================================\n   TYPED\n   ============================================================ */\nnew Typed('#typed', {\n  strings: [\n    'Senior BI &amp; Market Research Analyst',\n    'AI Implementation Engineer',\n    'LangChain &amp; RAG Pipeline Builder',\n    'Power BI &amp; SQL Architect',\n    'Prompt Engineer · Agentic Workflows'\n  ],\n  typeSpeed: 55,\n  backSpeed: 28,\n  backDelay: 1600,\n  loop: true,\n  smartBackspace: true\n});\n\n/* ============================================================\n   THREE.JS hero — particle mesh with mouse parallax\n   ============================================================ */\n(function hero3D(){\n  const canvas = document.getElementById('hero-canvas');\n  if(!window.THREE) return;\n  const w = ()=>canvas.parentElement.clientWidth;\n  const h = ()=>canvas.parentElement.clientHeight;\n\n  const renderer = new THREE.WebGLRenderer({canvas, alpha:true, antialias:true});\n  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));\n  renderer.setSize(w(), h(), false);\n\n  const scene = new THREE.Scene();\n  const camera = new THREE.PerspectiveCamera(60, w()/h(), 0.1, 100);\n  camera.position.z = 8;\n\n  // particle field\n  const N = 220;\n  const positions = new Float32Array(N*3);\n  const velocities = [];\n  for(let i=0;i<N;i++){\n    positions[i*3]   = (Math.random()-0.5)*16;\n    positions[i*3+1] = (Math.random()-0.5)*10;\n    positions[i*3+2] = (Math.random()-0.5)*6 - 2;\n    velocities.push((Math.random()-0.5)*0.004,(Math.random()-0.5)*0.004,(Math.random()-0.5)*0.003);\n  }\n  const geo = new THREE.BufferGeometry();\n  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));\n\n  const mat = new THREE.PointsMaterial({\n    color:0x00d4d8, size:0.06, transparent:true, opacity:0.9, sizeAttenuation:true\n  });\n  const points = new THREE.Points(geo, mat);\n  scene.add(points);\n\n  // line mesh between close points\n  const lineGeo = new THREE.BufferGeometry();\n  const lineMat = new THREE.LineBasicMaterial({color:0x00d4d8, transparent:true, opacity:0.18});\n  const lines = new THREE.LineSegments(lineGeo, lineMat);\n  scene.add(lines);\n\n  // wireframe icosahedron, very subtle\n  const icoGeo = new THREE.IcosahedronGeometry(2.2, 1);\n  const icoMat = new THREE.MeshBasicMaterial({color:0x00d4d8, wireframe:true, transparent:true, opacity:0.07});\n  const ico = new THREE.Mesh(icoGeo, icoMat);\n  ico.position.set(2.5, 0, -1);\n  scene.add(ico);\n\n  // mouse parallax\n  const mouse = {x:0, y:0, tx:0, ty:0};\n  window.addEventListener('mousemove', e=>{\n    mouse.tx = (e.clientX / window.innerWidth - 0.5);\n    mouse.ty = (e.clientY / window.innerHeight - 0.5);\n  });\n\n  function rebuildLines(){\n    const segs = [];\n    const pa = geo.attributes.position.array;\n    const maxD = 1.2;\n    for(let i=0;i<N;i++){\n      for(let j=i+1;j<N;j++){\n        const dx = pa[i*3]-pa[j*3], dy = pa[i*3+1]-pa[j*3+1], dz = pa[i*3+2]-pa[j*3+2];\n        const d2 = dx*dx+dy*dy+dz*dz;\n        if(d2 < maxD*maxD){\n          segs.push(pa[i*3],pa[i*3+1],pa[i*3+2], pa[j*3],pa[j*3+1],pa[j*3+2]);\n        }\n      }\n    }\n    lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(segs), 3));\n  }\n\n  let frame=0;\n  function loop(){\n    frame++;\n    const pa = geo.attributes.position.array;\n    for(let i=0;i<N;i++){\n      pa[i*3]   += velocities[i*3];\n      pa[i*3+1] += velocities[i*3+1];\n      pa[i*3+2] += velocities[i*3+2];\n      // wrap\n      if(pa[i*3]>8||pa[i*3]<-8) velocities[i*3]*=-1;\n      if(pa[i*3+1]>5||pa[i*3+1]<-5) velocities[i*3+1]*=-1;\n      if(pa[i*3+2]>2||pa[i*3+2]<-6) velocities[i*3+2]*=-1;\n    }\n    geo.attributes.position.needsUpdate = true;\n    if(frame % 5 === 0) rebuildLines();\n\n    mouse.x += (mouse.tx - mouse.x)*0.05;\n    mouse.y += (mouse.ty - mouse.y)*0.05;\n\n    points.rotation.y = mouse.x * 0.6 + frame*0.0008;\n    points.rotation.x = mouse.y * 0.4;\n    lines.rotation.y = points.rotation.y;\n    lines.rotation.x = points.rotation.x;\n    ico.rotation.y += 0.0024;\n    ico.rotation.x += 0.0014;\n    ico.position.x = 2.5 + mouse.x*0.6;\n    ico.position.y = -mouse.y*0.4;\n\n    renderer.render(scene, camera);\n    requestAnimationFrame(loop);\n  }\n  rebuildLines();\n  loop();\n\n  window.addEventListener('resize', ()=>{\n    renderer.setSize(w(), h(), false);\n    camera.aspect = w()/h();\n    camera.updateProjectionMatrix();\n  });\n})();\n\n/* ============================================================\n   NAV scroll\n   ============================================================ */\nconst nav = document.getElementById('nav');\nwindow.addEventListener('scroll', ()=>{\n  nav.classList.toggle('scrolled', window.scrollY > 24);\n}, {passive:true});\n\n/* ============================================================\n   GSAP — reveals, counters, timeline, rings\n   ============================================================ */\nif(window.gsap && window.ScrollTrigger){\n  gsap.registerPlugin(ScrollTrigger);\n\n  // reveal all .reveal\n  document.querySelectorAll('.reveal').forEach(el=>{\n    ScrollTrigger.create({\n      trigger:el, start:'top 85%',\n      onEnter:()=>el.classList.add('in'),\n      once:true\n    });\n  });\n\n  // counters\n  document.querySelectorAll('[data-count]').forEach(el=>{\n    const target = parseInt(el.dataset.count,10);\n    ScrollTrigger.create({\n      trigger:el, start:'top 90%', once:true,\n      onEnter:()=>{\n        const obj = {v:0};\n        gsap.to(obj,{v:target, duration:1.6, ease:'power2.out',\n          onUpdate:()=>{ el.textContent = Math.round(obj.v); }\n        });\n      }\n    });\n  });\n\n  // rings\n  document.querySelectorAll('.skill-rings .ring').forEach(r=>{\n    const circle = r.querySelector('.fg');\n    const txt = r.querySelector('.ring-pct');\n    const target = parseFloat(circle.dataset.target);\n    const pct = parseInt(txt.dataset.pct,10);\n    ScrollTrigger.create({\n      trigger:r, start:'top 90%', once:true,\n      onEnter:()=>{\n        gsap.to(circle, {strokeDashoffset:target, duration:1.4, ease:'power3.out'});\n        const o = {v:0};\n        gsap.to(o, {v:pct, duration:1.4, ease:'power2.out', onUpdate:()=>{txt.textContent = Math.round(o.v)+'%';}});\n      }\n    });\n  });\n\n  // timeline line draw\n  const fill = document.getElementById('tl-fill');\n  ScrollTrigger.create({\n    trigger:'#timeline', start:'top 70%', end:'bottom 60%',\n    scrub:true,\n    onUpdate:(self)=>{ fill.style.height = (self.progress*100).toFixed(2)+'%'; }\n  });\n}\n\n/* ============================================================\n   3D tilt on cards & tech\n   ============================================================ */\ndocument.querySelectorAll('[data-tilt]').forEach(card=>{\n  let raf;\n  function onMove(e){\n    const r = card.getBoundingClientRect();\n    const x = (e.clientX - r.left)/r.width - 0.5;\n    const y = (e.clientY - r.top)/r.height - 0.5;\n    cancelAnimationFrame(raf);\n    raf = requestAnimationFrame(()=>{\n      card.style.transform = `perspective(900px) rotateX(${-y*6}deg) rotateY(${x*8}deg) translateZ(0)`;\n    });\n  }\n  function reset(){ card.style.transform=''; }\n  card.addEventListener('mousemove', onMove);\n  card.addEventListener('mouseleave', reset);\n});\n\n/* ============================================================\n   Modal\n   ============================================================ */\nconst modal = document.getElementById('modal');\nconst mTitle = document.getElementById('modal-title');\nconst mSub = document.getElementById('modal-sub');\nconst mStack = document.getElementById('modal-stack');\nconst mBody = document.getElementById('modal-body');\ndocument.addEventListener('click', e=>{\n  const t = e.target.closest('[data-open]');\n  if(t){\n    const id = t.dataset.open;\n    const p = PROJECTS.find(x=>x.id===id);\n    if(!p) return;\n    mTitle.innerHTML = p.title;\n    mSub.textContent = p.tag;\n    mStack.innerHTML = p.stack.map(s=>`<span class=\"badge\">${s}<\u002Fspan>`).join('');\n    mBody.innerHTML = p.body || '<p>Case study coming soon.<\u002Fp>';\n    modal.classList.add('open');\n  }\n});\ndocument.getElementById('modal-close').addEventListener('click', ()=>modal.classList.remove('open'));\nmodal.addEventListener('click', e=>{ if(e.target===modal) modal.classList.remove('open'); });\nwindow.addEventListener('keydown', e=>{ if(e.key==='Escape') modal.classList.remove('open'); });\n\n/* ============================================================\n   Copy email\n   ============================================================ */\nconst toast = document.getElementById('toast');\ndocument.getElementById('copy-email').addEventListener('click', async ()=>{\n  try{\n    await navigator.clipboard.writeText('shruthikatrapally1994@gmail.com');\n    toast.classList.add('show');\n    setTimeout(()=>toast.classList.remove('show'), 2000);\n  }catch(err){\n    window.location.href = 'mailto:shruthikatrapally1994@gmail.com';\n  }\n});\n\n/* Resume click — provide guidance since no real file */\ndocument.getElementById('dl-resume').addEventListener('click', (e)=>{\n  e.preventDefault();\n  // Open mailto as a graceful fallback so the button feels alive\n  toast.querySelector('.dot').style.background = '#ffd700';\n  toast.childNodes[1].textContent = ' Resume on request — email to receive';\n  toast.classList.add('show');\n  setTimeout(()=>{\n    toast.classList.remove('show');\n    toast.querySelector('.dot').style.background = 'var(--color-primary)';\n    toast.childNodes[1].textContent = ' Email copied to clipboard';\n  }, 2200);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
